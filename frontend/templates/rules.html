<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rules Execution - Bookstore Simulation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <span class="icon">📚</span>
                <span>Bookstore MAS</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/graphs">📊 Graphs</a></li>
                <li><a href="/agents">👥 Agents</a></li>
                <li><a href="/rules" class="active">⚙️ Rules</a></li>
                <li><a href="/messages">💬 Messages</a></li>
                <li><a href="/ontology">🔗 Ontology</a></li>
                <li><a href="/summary">📋 Summary</a></li>
                <li><a href="/history">🕒 History</a></li>
            </ul>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <div class="container" style="margin-top: 2rem;">
        <div class="card animate-in">
            <div class="card-header">
                <h2 class="card-title">
                    <span>⚙️</span>
                    SWRL Rules Execution Log
                </h2>
                <div class="flex gap-2">
                    <input type="text" id="searchInput" class="form-input" placeholder="Search rules..." style="width: 300px;">
                    <select id="ruleFilter" class="form-input" style="width: 200px;">
                        <option value="">All Rules</option>
                    </select>
                    <button class="btn btn-primary" onclick="refreshRules()">
                        <span>🔄</span>
                        Refresh
                    </button>
                </div>
            </div>
            <div class="card-body">
                <!-- Stats -->
                <div class="grid grid-4 mb-3">
                    <div class="stat-card" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                        <div class="stat-icon">⚡</div>
                        <div class="stat-value" id="total-rules">0</div>
                        <div class="stat-label">Total Executions</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                        <div class="stat-icon">📋</div>
                        <div class="stat-value" id="unique-rules">0</div>
                        <div class="stat-label">Unique Rules</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
                        <div class="stat-icon">🔥</div>
                        <div class="stat-value" id="top-rule">-</div>
                        <div class="stat-label">Most Fired</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
                        <div class="stat-icon">📊</div>
                        <div class="stat-value" id="avg-per-step">0</div>
                        <div class="stat-label">Avg per Step</div>
                    </div>
                </div>

                <!-- Rules Log -->
                <div id="rulesContainer" style="max-height: 700px; overflow-y: auto;">
                    <!-- Rules will be loaded here -->
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/rules.js') }}"></script>
</body>
</html>
