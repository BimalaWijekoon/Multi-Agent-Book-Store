<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation History - Bookstore MAS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .history-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            cursor: pointer;
            transition: var(--transition-base);
        }
        
        .history-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }
        
        .history-timestamp {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-white);
        }
        
        .history-status {
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        
        .history-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--spacing-md);
            margin-top: var(--spacing-md);
        }
        
        .history-stat {
            text-align: center;
            padding: var(--spacing-sm);
            background: rgba(139, 92, 246, 0.1);
            border-radius: var(--radius-sm);
        }
        
        .history-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .history-stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: var(--spacing-xs);
        }
        
        .load-button {
            margin-top: var(--spacing-md);
            width: 100%;
        }
        
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-muted);
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-md);
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <span class="icon">📚</span>
                <span>Bookstore MAS</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/graphs">📊 Graphs</a></li>
                <li><a href="/agents">👥 Agents</a></li>
                <li><a href="/rules">⚙️ Rules</a></li>
                <li><a href="/messages">💬 Messages</a></li>
                <li><a href="/ontology">🔗 Ontology</a></li>
                <li><a href="/summary">📋 Summary</a></li>
                <li><a href="/history" class="active">🕒 History</a></li>
                <li><a href="/about">ℹ️ About</a></li>
            </ul>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <span>🕒</span>
                    Simulation History
                </h2>
                <button class="btn btn-primary" onclick="refreshHistory()">
                    🔄 Refresh
                </button>
            </div>
            <div class="card-body">
                <div id="historyList">
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <p>Loading simulation history...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/history.js') }}"></script>
</body>
</html>
